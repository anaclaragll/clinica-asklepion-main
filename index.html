<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área do Paciente | Clínica Asklepion</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-icon" aria-hidden="true">+</div>
        <div>
          <h1>Clínica Asklepion</h1>
          <p id="welcomeText">Área do paciente</p>
        </div>
      </div>
      <button id="logoutBtn" class="btn topbar-btn" type="button">Sair</button>
    </header>

    <main class="page">
      <nav class="tabs" aria-label="Navegação principal">
        <button class="tab active" data-target="minhas-consultas">Minhas Consultas</button>
        <button class="tab" data-target="agendamento">Agendar Consulta</button>
        <button class="tab" data-target="medicos">Médicos e Especialidades</button>
      </nav>

      <section id="minhas-consultas" class="panel active">
        <article class="card">
          <h2>Minhas Consultas</h2>
          <div id="myAppointments"></div>
        </article>
      </section>

      <section id="agendamento" class="panel">
        <article class="card">
          <h2>1) Escolha um médico</h2>
          <p class="hint">Clique no card para continuar.</p>
          <div id="doctorList" class="grid"></div>
        </article>

        <article id="doctorDetailsCard" class="card hidden">
          <h2>2) Detalhes do médico</h2>
          <div id="doctorDetails"></div>
          <h3>Dias disponíveis</h3>
          <div id="dayList" class="chips"></div>
        </article>

        <article id="timeCard" class="card hidden">
          <h2>3) Escolha um horário</h2>
          <p id="selectedDayText" class="hint"></p>
          <div id="timeList" class="chips"></div>
        </article>

        <article id="confirmCard" class="card hidden">
          <h2>4) Confirmar agendamento</h2>
          <p id="bookingSummary" class="hint"></p>
          <div class="form-row">
            <label>Nome completo</label>
            <input id="patientNameInput" type="text" />
          </div>
          <div class="form-row">
            <label>CPF</label>
            <input id="patientCpfInput" type="text" />
          </div>
          <div class="form-row">
            <label>E-mail</label>
            <input id="patientEmailInput" type="email" />
          </div>
          <button id="confirmBookingBtn" type="button" class="btn primary">Confirmar agendamento</button>
        </article>

        <article id="confirmationCard" class="card hidden success-card" aria-live="polite"></article>
      </section>

      <section id="medicos" class="panel">
        <article class="card">
          <h2>Médicos e especialidades</h2>
          <div id="doctorShowcase" class="grid"></div>
        </article>
      </section>
    </main>

    <script src="js/auth.js?v=3"></script>
    <script src="js/app.js?v=3"></script>
  </body>
</html>
