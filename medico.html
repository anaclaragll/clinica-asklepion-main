<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área Médica | Clínica Asklepion</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand-wrap">
        <div class="brand-icon" aria-hidden="true">+</div>
        <div>
          <h1>Clínica Asklepion</h1>
          <p id="doctorSubtitle">Área médica</p>
        </div>
      </div>
      <button id="logoutBtn" class="btn topbar-btn" type="button">Sair</button>
    </header>

    <main class="page">
      <nav class="tabs" aria-label="Navegação da área médica">
        <button class="tab active" data-target="consultas">Minhas Consultas</button>
        <button class="tab" data-target="perfil">Meu Perfil</button>
        <button class="tab" data-target="configuracoes">Configurações</button>
        <button class="tab" data-target="disponibilidade">Disponibilidade</button>
      </nav>

      <section id="consultas" class="panel active">
        <article class="card">
          <h2>Minhas Consultas</h2>
          <div id="doctorAppointments"><p class="hint">Carregando consultas...</p></div>
        </article>
      </section>

      <section id="perfil" class="panel">
        <article class="card">
          <h2>Meu Perfil</h2>
          <p id="doctorProfile"></p>
        </article>
      </section>

      <section id="configuracoes" class="panel">
        <article class="card">
          <h2>Configurações</h2>
          <p class="hint">Painel inicial para futuras preferências da equipe médica.</p>
        </article>
      </section>

      <section id="disponibilidade" class="panel">
        <article class="card">
          <h2>Gerenciar Disponibilidade</h2>
          <form id="availabilityForm">
            <label>Dia da semana
              <select id="weekdaySelect">
                <option value="1">Segunda (1)</option>
                <option value="2">Terça (2)</option>
                <option value="3">Quarta (3)</option>
                <option value="4">Quinta (4)</option>
                <option value="5">Sexta (5)</option>
                <option value="6">Sábado (6)</option>
                <option value="0">Domingo (0)</option>
              </select>
            </label>
            <label>Início <input id="startTime" type="time" /></label>
            <label>Fim <input id="endTime" type="time" /></label>
            <label>Intervalo (min) <input id="slotMinutes" type="number" value="30" min="5" /></label>
            <button id="addAvailabilityBtn" type="button" class="btn">Adicionar</button>
          </form>

          <h3>Entradas existentes</h3>
          <div id="availabilityList"></div>
        </article>
      </section>
    </main>

    <script src="js/auth.js?v=3"></script>
    <script src="js/medico.js?v=3"></script>
  </body>
</html>
